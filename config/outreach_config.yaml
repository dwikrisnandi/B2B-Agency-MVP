# ═══════════════════════════════════════════════════════
# Outreach Bot Configuration
# ═══════════════════════════════════════════════════════
# Edit this file to configure outreach behavior.
# No code changes required.

# Creator account credentials
account:
  login_url: "https://example-platform.com/login"
  credentials:
    username: "${CREATOR_USERNAME}"   # reads from environment variable
    password: "${CREATOR_PASSWORD}"   # reads from environment variable
  selectors:
    username_field: "input[name='email']"
    password_field: "input[name='password']"
    submit_button: "button[type='submit']"
  post_login_wait: 3

# Message configuration
message:
  # Path to the message template file (supports {username} placeholder)
  template_file: "./config/message_template.txt"
  
  # Platform-specific selectors for the messaging UI
  selectors:
    # How to navigate to a user's DM / message page
    message_button: "button.send-message"
    message_input: "textarea.message-input"
    send_button: "button.send-btn"
    # Confirmation element that appears after successful send
    success_indicator: ".message-sent-confirmation"

# Input — the scraped user list
input:
  csv_path: "./output/scraped_users_latest.csv"
  username_column: "username"
  # Skip users already messaged (checked against the log)
  skip_already_messaged: true

# Rate limiting — critical for responsible outreach
rate_limit:
  messages_per_hour: 15
  min_delay_seconds: 30
  max_delay_seconds: 90
  # Add human-like randomness to delays
  jitter: true
  # Pause for N minutes after every batch of messages
  batch_size: 5
  batch_pause_minutes: 10
  # Daily cap — stop after this many messages in 24 hours
  daily_limit: 50

# Session management
session:
  # Re-login if session expires
  auto_relogin: true
  # Max session duration before forced re-login (minutes)
  max_session_minutes: 120
  # Cooldown before re-login attempt (seconds)
  relogin_cooldown: 30

# Logging
logging:
  # Directory for outreach logs
  log_directory: "./logs"
  # Track all sent messages with timestamps
  message_log: "./logs/outreach_log.csv"
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"

# Browser settings
browser:
  headless: true
  viewport_width: 1920
  viewport_height: 1080
  navigation_timeout: 30

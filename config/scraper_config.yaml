# ═══════════════════════════════════════════════════════
# Scraper Configuration
# ═══════════════════════════════════════════════════════
# Edit this file to configure the scraper behavior.
# No code changes required.

target:
  # Base URL of the membership platform page to scrape
  base_url: "http://localhost:8000/mock_platform.html"
  
  # CSS selectors for extracting data from the page
  selectors:
    # Selector for each user card/container on the page
    user_container: ".member-card"
    # Selector for the username element within each container
    username: ".member-username"
    # (Optional) Selector for display name
    display_name: ".member-display-name"
    # (Optional) Selector for profile link
    profile_link: "a.member-profile-link"

  # Pagination strategy: "click" | "scroll" | "url_param" | "none"
  pagination:
    strategy: "none"
    # For "url_param" strategy
    param_name: "page"
    max_pages: 50
    # For "scroll" strategy — how many scroll attempts before stopping
    max_scrolls: 100
    # Delay (seconds) after each scroll to let content load
    scroll_delay: 2.0

# Authentication (if the platform requires login to view members)
auth:
  required: false
  login_url: "https://example-platform.com/login"
  credentials:
    username: "${PLATFORM_USERNAME}"   # reads from environment variable
    password: "${PLATFORM_PASSWORD}"   # reads from environment variable
  selectors:
    username_field: "input[name='email']"
    password_field: "input[name='password']"
    submit_button: "button[type='submit']"
  # Wait (seconds) after login for redirect to complete
  post_login_wait: 3

# Rate limiting — be respectful
rate_limit:
  requests_per_minute: 20
  min_delay_seconds: 1.5
  max_delay_seconds: 4.0
  # Back-off multiplier when rate-limited (HTTP 429)
  backoff_multiplier: 2.0
  max_backoff_seconds: 60

# Output settings
output:
  directory: "./output"
  filename: "scraped_users_{timestamp}.csv"
  # Columns to include in the CSV
  columns:
    - username
    - display_name
    - profile_url
    - scraped_at

# Browser settings
browser:
  headless: true
  # Viewport dimensions (some platforms render differently on mobile)
  viewport_width: 1920
  viewport_height: 1080
  # Custom user agent (rotated automatically if left empty)
  user_agent: ""
  # Timeout for page navigation (seconds)
  navigation_timeout: 30
